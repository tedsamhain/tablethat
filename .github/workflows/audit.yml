name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "**/deny.toml"
  pull_request:
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "**/deny.toml"
  schedule:
    - cron: "0 6 * * *"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-audit,cargo-deny

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run audits
        run: just audit
